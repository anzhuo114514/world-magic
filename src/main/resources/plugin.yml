name: WorldMagic
version: '1.0.0'
main: com.github.vevc.WorldMagicPlugin
api-version: '1.21'

commands:
  worldmagic:
    description: WorldMagic 主命令
    usage: /<command> [reload|status|source|restart|info]
    aliases: [wm]
    permission: worldmagic.use

permissions:
  worldmagic.use:
    description: 允许使用 WorldMagic 基本命令
    default: op
  worldmagic.reload:
    description: 允许重载配置
    default: op
  worldmagic.status:
    description: 允许查看状态
    default: true
  worldmagic.source:
    description: 允许切换下载源
    default: op
  worldmagic.restart:
    description: 允许重启服务
    default: op
